version: 1

# Graph rules (enforced by convention, validated manually):
#   [ ] node.id must match failure_id in the corresponding pattern file
#   [ ] edge.from and edge.to must reference existing node ids
#   [ ] edge.conditions must NOT use signal names (use semantic names)
#   [ ] edge.relation must be one of: predisposes | induces | propagates_to
#   [ ] node.layer must be one of: reasoning | system | retrieval | output
#   [ ] status: planned nodes are excluded by graph_loader at runtime
#
# This graph is NOT used for diagnosis.
# It is used only for: causal interpretation, path construction, explanation.

contracts:
  node_id_matches_failure_id: true
  condition_namespace: signal_contract_shared

nodes:

  - id: clarification_failure
    role: initiating_failure
    layer: reasoning
    status: defined
    note: >
      The system fails to request clarification under ambiguous input,
      leading to premature commitment to a single interpretation.

  - id: assumption_invalidation_failure
    role: initiating_failure
    layer: reasoning
    status: defined
    note: >
      The system fails to abandon an invalidated hypothesis despite
      contradicting evidence, persisting with an incorrect assumption.

  - id: premature_model_commitment
    role: root_cause
    layer: reasoning
    status: defined
    note: >
      Diagnosable as of PMC telemetry contract v1.
      Requires: input.ambiguity_score, interaction.clarification_triggered,
      interaction.user_correction_detected, reasoning.replanned.

  - id: semantic_cache_intent_bleeding
    role: initiating_failure
    layer: system
    status: defined
    note: >
      Observable initiating failure in the current telemetry surface.
      May be predisposed by premature_model_commitment.

  - id: rag_retrieval_drift
    role: propagated_failure
    layer: retrieval
    status: defined

  - id: instruction_priority_inversion
    role: initiating_failure
    layer: system
    status: defined
    note: >
      The system fails to maintain correct priority between system, user,
      and retrieved instructions, allowing lower-priority instructions
      to override higher-priority ones.

  - id: prompt_injection_via_retrieval
    role: initiating_failure
    layer: retrieval
    status: defined
    note: >
      Retrieved content introduces adversarial or instruction-altering signals
      that override or distort the intended task.

  - id: context_truncation_loss
    role: initiating_failure
    layer: retrieval
    status: defined
    note: >
      Critical information is lost due to context window truncation,
      leading to incomplete retrieval and degraded downstream behavior.

  - id: agent_tool_call_loop
    role: propagated_failure
    layer: system
    status: defined
    note: >
      Repeated tool invocation without meaningful state progress.
      Often predisposed by premature_model_commitment.

  - id: tool_result_misinterpretation
    role: propagated_failure
    layer: system
    status: defined
    note: >
      Tool outputs are interpreted incorrectly, leading to wrong decisions
      despite correct tool execution.

  - id: repair_strategy_failure
    role: propagated_failure
    layer: reasoning
    status: defined
    note: >
      The system attempts to patch an incorrect output rather than
      regenerating from corrected assumptions, propagating errors.

  - id: incorrect_output
    role: outcome
    layer: output
    status: defined
    note: >
      The system produces output that is misaligned with user intent
      or requires user correction. Terminal node in the causal graph.

  # --- Meta failures (model limitations, not domain failures) ---

  - id: unmodeled_failure
    role: meta
    layer: meta
    status: defined
    note: >
      Symptoms are present (low alignment, user correction) but no
      defined failure pattern was diagnosed. Indicates a failure outside
      the current taxonomy. Not part of the causal graph.

  - id: insufficient_observability
    role: meta
    layer: meta
    status: defined
    note: >
      Telemetry is too incomplete for reliable diagnosis. Critical log
      fields are missing. Distinguishes "no failure" from "cannot determine."
      Not part of the causal graph.

  - id: conflicting_signals
    role: meta
    layer: meta
    status: defined
    note: >
      Observed signals point in contradictory directions, reducing
      confidence in any single diagnosis. Flags cases that need review.
      Not part of the causal graph.


edges:

  - id: E_clarification_to_invalidation
    from: clarification_failure
    to: assumption_invalidation_failure
    relation: predisposes
    semantics:
      description: >
        Lack of clarification under ambiguity leads the system to form
        an assumption that it subsequently fails to invalidate.
      conditions:
        - ambiguity_detected_without_clarification
        - no_hypothesis_branching
      note: >
        Observable edge. Clarification failure is the trigger condition
        that leads to assumption persistence.

  - id: E_invalidation_to_pmc
    from: assumption_invalidation_failure
    to: premature_model_commitment
    relation: predisposes
    semantics:
      description: >
        Failure to invalidate an incorrect assumption leads to premature
        commitment to a single interpretation.
      conditions:
        - contradiction_ignored
        - hypothesis_retained_despite_evidence
      note: >
        Observable edge. Assumption persistence is the mechanism
        that enables premature commitment.

  - id: E_pmc_to_scib
    from: premature_model_commitment
    to: semantic_cache_intent_bleeding
    relation: predisposes
    semantics:
      description: >
        Early hypothesis fixation increases the probability of cache misuse:
        a committed interpretation accepts high-similarity cache hits
        that conflict with the actual user intent.
      conditions:
        - ambiguous_input_without_clarification
        - persistence_without_replanning
      note: >
        Observable edge. Both nodes are now diagnosable.

  - id: E_scib_to_rrd
    from: semantic_cache_intent_bleeding
    to: rag_retrieval_drift
    relation: induces
    semantics:
      description: >
        Cache reuse with intent mismatch leads to degraded retrieval behavior.
      conditions:
        - high_similarity_cache_hit_with_intent_mismatch
        - retrieval_bypassed_by_cache
      note: >
        Observable edge supported by current telemetry and co-diagnosis.

  - id: E_pmc_to_prompt_injection
    from: premature_model_commitment
    to: prompt_injection_via_retrieval
    relation: predisposes
    semantics:
      description: >
        Early commitment without critical evaluation increases susceptibility
        to adversarial or misleading retrieved content.
      conditions:
        - lack_of_critical_evaluation_of_context
        - overcommitment_to_single_interpretation
      note: >
        Observable edge. PMC reduces the agent's ability to
        critically assess retrieved content.

  - id: E_priority_inversion_to_prompt_injection
    from: instruction_priority_inversion
    to: prompt_injection_via_retrieval
    relation: predisposes
    semantics:
      description: >
        Incorrect instruction prioritization makes the system susceptible
        to adversarial or conflicting retrieved instructions.
      conditions:
        - instruction_priority_misordered
        - external_context_overrides_system_instruction
      note: >
        Observable edge. Priority inversion is the structural precondition
        for prompt injection to succeed.

  - id: E_prompt_injection_to_rrd
    from: prompt_injection_via_retrieval
    to: rag_retrieval_drift
    relation: induces
    semantics:
      description: >
        Adversarial or instruction-altering retrieved content distorts
        retrieval relevance and leads to degraded retrieval behavior.
      conditions:
        - adversarial_context_present
        - instruction_override_from_context
      note: >
        Observable edge. Prompt injection poisons downstream retrieval.

  - id: E_truncation_to_rrd
    from: context_truncation_loss
    to: rag_retrieval_drift
    relation: induces
    semantics:
      description: >
        Context truncation removes critical information from the retrieval
        context, causing downstream retrieval to miss relevant content.
      conditions:
        - critical_information_truncated
        - retrieval_coverage_degraded
      note: >
        Observable edge. Truncation is a structural cause of retrieval
        drift, distinct from semantic causes like cache misuse.

  - id: E_pmc_to_tool_loop
    from: premature_model_commitment
    to: agent_tool_call_loop
    relation: predisposes
    semantics:
      description: >
        Early commitment without replanning can cause repeated tool use
        under an invalid or unchanged assumption.
      conditions:
        - repeated_tool_invocation_without_progress
        - persistence_without_replanning
      note: >
        Observable edge when repeated tool calls are accompanied by
        lack of meaningful state change.

  - id: E_tool_loop_to_misinterpretation
    from: agent_tool_call_loop
    to: tool_result_misinterpretation
    relation: induces
    semantics:
      description: >
        Repeated tool invocation without progress leads to misinterpretation
        of tool outputs.
      conditions:
        - repeated_tool_use
        - no_state_progress
      note: >
        Observable edge. Looping erodes the agent's ability to correctly
        interpret tool results.

  - id: E_pmc_to_repair_failure
    from: premature_model_commitment
    to: repair_strategy_failure
    relation: induces
    semantics:
      description: >
        Premature commitment causes the system to patch outputs rather
        than regenerate from corrected assumptions.
      conditions:
        - output_patched_without_regeneration
        - assumption_unchanged_after_error
      note: >
        Observable edge. Commitment to a fixed interpretation
        prevents proper error recovery.

  - id: E_rrd_to_output
    from: rag_retrieval_drift
    to: incorrect_output
    relation: propagates_to
    semantics:
      description: >
        Retrieval drift leads to incorrect or misaligned output.
      conditions:
        - output_misaligned_with_intent
      note: >
        Observable edge. Both nodes are now diagnosable.


# Relationships define semantic constraints between failures.
# These are NOT used for diagnosis — only for explanation and conflict resolution.
#
# mode:
#   soft  → both can be diagnosed, but scoring favors one over others
#   hard  → mutual exclusion enforced (future)

relationships:

  - type: exclusivity
    group: retrieval_root_conflict
    failures:
      - semantic_cache_intent_bleeding
      - prompt_injection_via_retrieval
      - context_truncation_loss
    mode: soft
    note: >
      These three failures represent competing upstream causes of
      rag_retrieval_drift: semantic misuse (SCIB), adversarial content
      (prompt injection), and information loss (truncation).
      When multiple are active, the highest-scoring path is primary
      and others are suppressed to alternative status.
