name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable)
        run: pip install -e .

      - name: Validate all failure patterns (YAML)
        run: |
          python -c "
          import yaml
          from llm_failure_atlas.resource_loader import get_patterns_dir
          from pathlib import Path
          errors = []
          patterns_dir = Path(get_patterns_dir())
          for f in sorted(patterns_dir.glob('*.yaml')):
              try:
                  p = yaml.safe_load(f.read_text(encoding='utf-8'))
                  assert 'failure_id' in p, f'missing failure_id in {f.name}'
                  assert 'signal_extraction' in p, f'missing signal_extraction in {f.name}'
                  assert 'diagnosis' in p, f'missing diagnosis in {f.name}'
              except Exception as e:
                  errors.append(f'{f.name}: {e}')
          if errors:
              for e in errors: print(f'FAIL: {e}')
              exit(1)
          print(f'OK: {len(list(patterns_dir.glob(\"*.yaml\")))} patterns validated')
          "

      - name: Validate failure graph
        run: |
          python -c "
          import yaml
          from llm_failure_atlas.resource_loader import get_graph_path
          g = yaml.safe_load(open(str(get_graph_path()), encoding='utf-8'))
          nodes = {n['id'] for n in g['nodes']}
          edges = g['edges']
          for e in edges:
              assert e['from'] in nodes, f'edge {e[\"id\"]}: unknown from={e[\"from\"]}'
              assert e['to'] in nodes, f'edge {e[\"id\"]}: unknown to={e[\"to\"]}'
          print(f'OK: {len(nodes)} nodes, {len(edges)} edges')
          "

      - name: Validate signal uniqueness
        run: |
          python -c "
          import yaml
          from llm_failure_atlas.resource_loader import get_patterns_dir
          from pathlib import Path
          signals = {}
          for f in sorted(Path(get_patterns_dir()).glob('*.yaml')):
              p = yaml.safe_load(f.read_text(encoding='utf-8'))
              for rule in p.get('signal_extraction', {}).get('rules', []):
                  sig = rule['signal']
                  rule_str = rule.get('rule', '')
                  if sig in signals:
                      prev_file, prev_rule = signals[sig]
                      if prev_rule != rule_str:
                          print(f'FAIL: signal \"{sig}\" has different rules:')
                          print(f'  {prev_file}: {prev_rule}')
                          print(f'  {f.name}: {rule_str}')
                          exit(1)
                  signals[sig] = (f.name, rule_str)
          print(f'OK: {len(signals)} unique signals (some shared across patterns)')
          "

      - name: Run matcher on sample trace
        run: |
          python -c "
          import json
          from pathlib import Path
          from llm_failure_atlas.adapters.langchain_adapter import LangChainAdapter
          from llm_failure_atlas.matcher import run
          from llm_failure_atlas.resource_loader import get_patterns_dir
          import importlib.resources as ir

          # Load sample trace from package
          sample_path = ir.files('llm_failure_atlas.adapters').joinpath('sample_langchain_trace.json')
          with open(str(sample_path)) as f:
              raw = json.load(f)
          adapter = LangChainAdapter()
          telemetry = adapter.build_matcher_input(raw)

          # Save adapted telemetry
          tmp = '/tmp/ci_adapted.json'
          with open(tmp, 'w') as f:
              json.dump(telemetry, f)

          # Run all patterns
          diagnosed = []
          for pf in sorted(Path(get_patterns_dir()).glob('*.yaml')):
              r = run(str(pf), tmp)
              if r.get('diagnosed'):
                  diagnosed.append(r['failure_id'])
          print(f'Diagnosed: {diagnosed}')
          assert len(diagnosed) >= 1, 'Expected at least 1 failure from sample trace'
          "

      - name: Run mutation testing
        run: python evaluation/mutation_eval.py

      - name: Run sensitivity analysis
        run: python evaluation/sensitivity_eval.py