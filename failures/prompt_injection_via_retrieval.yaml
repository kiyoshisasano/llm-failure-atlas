failure_id: prompt_injection_via_retrieval

# Signal names in this pattern are system-wide contracts.
# Rules:
#   - A signal name must have exactly one definition across all patterns.
#   - Do not redefine the same signal name with a different rule.
#   - If a different threshold is needed, define a new signal name.
signal_contract:
  shared_definitions: true

# Prompt injection telemetry contract
# Required log fields:
#   retrieval.contains_instruction   bool
#   retrieval.override_detected      bool
#   retrieval.adversarial_score      float (0.0–1.0)
#
# Note: These fields reflect analysis of retrieved content within the
# current reasoning turn, detecting adversarial or instruction-altering
# signals that may override the intended task.

signal_extraction:

  evaluation:
    missing_field: false
    multi_field_policy: strict_all_required

  rules:
    - signal: retrieved_context_instruction_override
      from:
        - retrieval.contains_instruction
        - retrieval.override_detected
      rule: retrieval.contains_instruction == true and retrieval.override_detected == true
      comment: retrieved content overrides task/system instructions

    - signal: retrieved_context_adversarial_pattern
      from:
        - retrieval.adversarial_score
      rule: retrieval.adversarial_score >= 0.7
      comment: adversarial pattern detected in retrieved content

diagnosis:

  threshold: 0.6

  # rationale:
  # instruction override alone may be a false positive (benign instructions).
  # adversarial pattern alone may be noise (high score without actual override).
  # the failure requires both: adversarial content that actually overrides.
  # confidence(both) = 0.4 + 0.3 = 0.7 >= 0.6 → diagnosed
  # confidence(override only) = 0.4 < 0.6 → not diagnosed
  # confidence(adversarial only) = 0.3 < 0.6 → not diagnosed

  evidence_modifiers:
    - signal: retrieved_context_instruction_override
      add: 0.4

    - signal: retrieved_context_adversarial_pattern
      add: 0.3

  confidence:
    initial: 0.0
    clamp:
      min: 0.0
      max: 1.0
