failure_id: semantic_cache_intent_bleeding

# Signal names in this pattern are system-wide contracts.
# Rules:
#   - A signal name must have exactly one definition across all patterns.
#   - Do not redefine the same signal name with a different rule.
#   - If a different threshold is needed, define a new signal name.
signal_contract:
  shared_definitions: true

# Phase 13 calibration applied (grid search, 90 configs, regression-constrained):
#   intent_threshold:    0.75 → 0.55 (tighter: filters borderline mismatches)
#   s1_weight:           0.4 → 0.2 (weakened: intent alone insufficient)
#   s2_weight:           0.3 → 0.4 (strengthened: retrieval skip is key evidence)
#   s3_weight:           0.2 → 0.3 (strengthened: alignment symptom)
#   diagnosis_threshold: 0.6 (unchanged)
#
# Effect:
#   S2+S3: 0.7 >= 0.6 → diagnosed (core combination)
#   S1+S2: 0.6 >= 0.6 → diagnosed (intent + skip)
#   S1+S3: 0.5 < 0.6 → not diagnosed (no retrieval skip = weak evidence)
#   S1 alone: 0.2 < 0.6 → not diagnosed
#
# Calibration result (30 validation scenarios):
#   false_positives:     2 → 0
#   threshold_boundary:  2 → 0
#   root_accuracy:       91.7% (maintained)
#   regression:          PASS (all 7 existing SCIB examples still diagnosed)

signal_extraction:

  evaluation:
    missing_field: false
    multi_field_policy: strict_all_required

  rules:

    # --- calibrated signal (Phase 13) ---
    - signal: cache_query_intent_mismatch
      from: cache.query_intent_similarity
      rule: value < 0.55
      comment: cached query intent differs from current query (tightened from 0.75)

    # --- reused signals (DO NOT CHANGE rules) ---
    - signal: retrieval_skipped_after_cache_hit
      from:
        - retrieval.skipped
        - cache.hit
        - cache.similarity
      rule: retrieval.skipped == true and cache.hit == true and cache.similarity >= 0.85
      comment: reuse from rag_retrieval_drift

    - signal: retrieved_docs_low_intent_alignment
      from: response.alignment_score
      rule: value < 0.5
      comment: reuse from rag_retrieval_drift

diagnosis:

  threshold: 0.6

  # rationale (Phase 13 calibrated):
  # S2 (retrieval_skipped) is now the anchor signal.
  # S2+S3 is the strongest combination (cache reuse + poor alignment = clear failure).
  # S1 (intent mismatch) is supplementary evidence, not sufficient alone.
  # This eliminates false positives where only intent mismatch was present
  # but output alignment was actually fine.

  evidence_modifiers:
    - signal: cache_query_intent_mismatch
      add: 0.2
    - signal: retrieval_skipped_after_cache_hit
      add: 0.4

  symptom_modifiers:
    - signal: retrieved_docs_low_intent_alignment
      add: 0.3

  confidence:
    initial: 0.0
    clamp:
      min: 0.0
      max: 1.0
