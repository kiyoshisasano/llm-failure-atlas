failure_id: incorrect_output

# Signal names in this pattern are system-wide contracts.
# Rules:
#   - A signal name must have exactly one definition across all patterns.
#   - Do not redefine the same signal name with a different rule.
#   - If a different threshold is needed, define a new signal name.
signal_contract:
  shared_definitions: true

cogency_tags: [outcome]

# Incorrect output telemetry contract
# Required log fields:
#   response.alignment_score           float (0.0–1.0)
#   interaction.user_correction_detected bool
#
# Note: This is the terminal outcome node. It detects that the system's
# output diverged from user intent, confirmed by low alignment or
# user correction.

signal_extraction:

  evaluation:
    missing_field: false
    multi_field_policy: strict_all_required

  rules:
    - signal: output_misaligned_with_intent
      from:
        - response.alignment_score
      rule: response.alignment_score < 0.5
      comment: output alignment with user intent is below threshold

    - signal: user_correction_required
      from:
        - interaction.user_correction_detected
      rule: interaction.user_correction_detected == true
      comment: user had to correct the system output

diagnosis:

  threshold: 0.6

  # rationale:
  # low alignment alone may be acceptable (exploratory response).
  # user correction alone may be minor (typo correction).
  # the failure requires both: output was misaligned AND user needed
  # to correct, confirming the output was incorrect.
  # confidence(both) = 0.4 + 0.3 = 0.7 >= 0.6 → diagnosed
  # confidence(alignment only) = 0.4 < 0.6 → not diagnosed
  # confidence(correction only) = 0.3 < 0.6 → not diagnosed

  evidence_modifiers:
    - signal: output_misaligned_with_intent
      add: 0.4

  symptom_modifiers:
    - signal: user_correction_required
      add: 0.3

  confidence:
    initial: 0.0
    clamp:
      min: 0.0
      max: 1.0
