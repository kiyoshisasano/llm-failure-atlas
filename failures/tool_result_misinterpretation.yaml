failure_id: tool_result_misinterpretation

# Signal names in this pattern are system-wide contracts.
# Rules:
#   - A signal name must have exactly one definition across all patterns.
#   - Do not redefine the same signal name with a different rule.
#   - If a different threshold is needed, define a new signal name.
signal_contract:
  shared_definitions: true

# Tool result misinterpretation telemetry contract
# Required log fields:
#   tool.output_valid        bool
#   state.updated_correctly  bool
#   tool.output_value        string or number
#   agent.decision_value     string or number
#
# Note: These fields reflect the relationship between tool execution
# results and the agent's subsequent interpretation and decisions.

signal_extraction:

  evaluation:
    missing_field: false
    multi_field_policy: strict_all_required

  rules:
    - signal: tool_output_misaligned_with_state
      from:
        - tool.output_valid
        - state.updated_correctly
      rule: tool.output_valid == true and state.updated_correctly == false
      comment: tool executed correctly but state was not updated accordingly

    - signal: decision_inconsistent_with_tool_output
      from:
        - tool.output_value
        - agent.decision_value
      rule: agent.decision_value != tool.output_value
      comment: agent decision diverges from what the tool returned

diagnosis:

  threshold: 0.6

  # rationale:
  # state misalignment alone could be a delayed update (not failure).
  # decision inconsistency alone could be intentional override.
  # the failure requires both: correct tool output was misinterpreted
  # AND the decision diverged from the tool result.
  # confidence(both) = 0.4 + 0.3 = 0.7 >= 0.6 → diagnosed
  # confidence(misaligned only) = 0.4 < 0.6 → not diagnosed
  # confidence(inconsistent only) = 0.3 < 0.6 → not diagnosed

  evidence_modifiers:
    - signal: tool_output_misaligned_with_state
      add: 0.4

    - signal: decision_inconsistent_with_tool_output
      add: 0.3

  confidence:
    initial: 0.0
    clamp:
      min: 0.0
      max: 1.0
