failure_id: instruction_priority_inversion

# Signal names in this pattern are system-wide contracts.
# Rules:
#   - A signal name must have exactly one definition across all patterns.
#   - Do not redefine the same signal name with a different rule.
#   - If a different threshold is needed, define a new signal name.
signal_contract:
  shared_definitions: true

# Instruction priority inversion telemetry contract
# Required log fields:
#   instruction.system_priority_respected  bool
#   context.external_instruction_weight    float (0.0–1.0)
#
# Note: instruction.system_priority_respected indicates whether the
# system instruction hierarchy was maintained. context.external_instruction_weight
# measures how much influence external/retrieved instructions had.

signal_extraction:

  evaluation:
    missing_field: false
    multi_field_policy: strict_all_required

  rules:
    - signal: system_instruction_overridden
      from:
        - instruction.system_priority_respected
      rule: instruction.system_priority_respected == false
      comment: system instruction priority was not maintained

    - signal: external_instruction_dominant
      from:
        - context.external_instruction_weight
      rule: context.external_instruction_weight > 0.7
      comment: external instructions dominated over system instructions

diagnosis:

  threshold: 0.6

  # rationale:
  # system instruction override alone may be by design (user override).
  # high external weight alone may be legitimate (relevant context).
  # the failure requires both: priority was not respected AND external
  # instructions dominated, indicating structural priority inversion.
  # confidence(both) = 0.4 + 0.3 = 0.7 >= 0.6 → diagnosed
  # confidence(override only) = 0.4 < 0.6 → not diagnosed
  # confidence(external only) = 0.3 < 0.6 → not diagnosed

  evidence_modifiers:
    - signal: system_instruction_overridden
      add: 0.4

    - signal: external_instruction_dominant
      add: 0.3

  confidence:
    initial: 0.0
    clamp:
      min: 0.0
      max: 1.0
