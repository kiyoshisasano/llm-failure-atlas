failure_id: conflicting_signals

# Meta failure: detects when signals point in contradictory directions.
#
# This is NOT a domain failure. It represents diagnostic ambiguity:
# the observed signals suggest conflicting explanations, reducing
# confidence in any single diagnosis.
#
# Purpose:
#   - Flags cases where the system's diagnosis may be unreliable
#   - Indicates that the failure may involve interactions not modeled in the graph
#   - Triggers review rather than automatic action

signal_contract:
  shared_definitions: true

cogency_tags: [coherence, meta]

# Telemetry contract:
#   cache.hit                            bool
#   cache.query_intent_similarity        float (0.0–1.0)
#   retrieval.skipped                    bool
#   response.alignment_score             float (0.0–1.0)
#   interaction.user_correction_detected bool
#
# This pattern detects contradictions in the observed telemetry:
#   - Cache reports a hit, but intent similarity is very low (cache lied)
#   - Response alignment is acceptable, but user still corrected (hidden failure)

signal_extraction:

  evaluation:
    missing_field: false
    multi_field_policy: strict_all_required

  rules:
    - signal: cache_hit_with_intent_mismatch
      from:
        - cache.hit
        - cache.query_intent_similarity
      rule: cache.hit == true and cache.query_intent_similarity < 0.3
      comment: >
        cache reported a hit but intent similarity is very low,
        suggesting the cache match was misleading

    - signal: acceptable_alignment_but_user_corrected
      from:
        - response.alignment_score
        - interaction.user_correction_detected
      rule: response.alignment_score >= 0.5 and interaction.user_correction_detected == true
      comment: >
        response appeared aligned by metric but user still corrected,
        suggesting the alignment measure is unreliable for this case

diagnosis:

  threshold: 0.5

  # rationale:
  # Like insufficient_observability, this uses a lower threshold (0.5)
  # because it serves as an early warning, not a confident diagnosis.
  # Either contradiction alone is enough to flag for review.
  # confidence(cache contradiction) = 0.4 >= 0.5 → not diagnosed alone
  # confidence(alignment contradiction) = 0.35 < 0.5 → not diagnosed alone
  # confidence(both) = 0.4 + 0.35 = 0.75 >= 0.5 → diagnosed
  # Note: single signal CAN trigger at 0.5 threshold if weights are adjusted.

  evidence_modifiers:
    - signal: cache_hit_with_intent_mismatch
      add: 0.4

    - signal: acceptable_alignment_but_user_corrected
      add: 0.35

  confidence:
    initial: 0.0
    clamp:
      min: 0.0
      max: 1.0
