failure_id: assumption_invalidation_failure

# Signal names in this pattern are system-wide contracts.
# Rules:
#   - A signal name must have exactly one definition across all patterns.
#   - Do not redefine the same signal name with a different rule.
#   - If a different threshold is needed, define a new signal name.
signal_contract:
  shared_definitions: true

# Assumption invalidation failure telemetry contract
# Required log fields:
#   reasoning.contradiction_detected  bool
#   reasoning.hypothesis_abandoned    bool
#
# Note: These fields reflect the system's ability to recognize evidence
# that contradicts its current hypothesis and act on it. The failure
# occurs when contradictions are detected but the hypothesis persists.

signal_extraction:

  evaluation:
    missing_field: false
    multi_field_policy: strict_all_required

  rules:
    - signal: contradiction_detected_but_ignored
      from:
        - reasoning.contradiction_detected
        - reasoning.hypothesis_abandoned
      rule: reasoning.contradiction_detected == true and reasoning.hypothesis_abandoned == false
      comment: contradicting evidence was detected but hypothesis was retained

    - signal: no_hypothesis_branching
      from:
        - reasoning.hypothesis_count
      rule: reasoning.hypothesis_count <= 1
      comment: reuse from clarification_failure

diagnosis:

  threshold: 0.6

  # rationale:
  # ignored contradiction alone may be valid (weak evidence).
  # no branching alone may be fine (unambiguous situation).
  # the failure requires both: contradiction was found AND the system
  # neither abandoned the hypothesis nor branched alternatives.
  # confidence(both) = 0.4 + 0.3 = 0.7 >= 0.6 → diagnosed
  # confidence(contradiction only) = 0.4 < 0.6 → not diagnosed
  # confidence(branching only) = 0.3 < 0.6 → not diagnosed

  evidence_modifiers:
    - signal: contradiction_detected_but_ignored
      add: 0.4

    - signal: no_hypothesis_branching
      add: 0.3

  confidence:
    initial: 0.0
    clamp:
      min: 0.0
      max: 1.0
